# Custom prompts for cooking video analysis
#
# Usage:
#   from sanjaya import Agent
#   from sanjaya.prompts import PromptConfig
#
#   config = PromptConfig.from_yaml("examples/prompts/cooking_video.yaml")
#   agent = Agent(prompts=config)
#   answer = agent.ask("What ingredients are used?", video="cooking.mp4")

video_strategy: |
  ## Cooking Video Analysis

  Focus on:
  - Ingredient identification via close-up frames
  - Cooking technique steps (timing, temperature, method)
  - Recipe structure (prep, cook, plate)

  Use caption_frames() liberally on cooking segments.
  Use vision_query() to read ingredient labels and measurements.
  Transcript is secondary — many cooking videos have music, not narration.

  ### One code block per response. Print everything.

critic: |
  Evaluate whether the answer correctly identifies:
  1. All ingredients visible on screen
  2. Cooking steps in chronological order
  3. Specific measurements and temperatures mentioned

  Question: {question}
  Schema: {schema}
  Answer: {answer}

  Return JSON: {{"score": <0-100>, "pass": <true if score >= {threshold}>, "gaps": [...], "feedback": "..."}}
